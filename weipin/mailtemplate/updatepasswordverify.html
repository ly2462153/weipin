<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>微品网修改密码邮件信息</title>
</head>
<body>
    <table width="600" border="0" align="center" cellpadding="0" cellspacing="0" bgcolor="#F8F9FB"
        style="border: solid 1px #DEDEDE;">
        <tr>
            <td style="padding: 12px;">
                <table width="100%" border="0" cellpadding="0" cellspacing="0">
                    <tr>
                        <td height="80" background="http://www.weipin365.com/img/topbg.jpg"><a href="http://www.weipin365.com">
                            <img src="http://www.weipin365.com/img/maillogo.jpg" width="319" height="80" border="0" /></a>
                        </td>
                    </tr>
                </table>
                <table width="100%" border="0" cellpadding="0" cellspacing="0" bgcolor="#FFFFFF">
                    <tr>
                        <td style="font-size: 12px; padding: 20px; padding-top: 5px;">
                            <p style="font-size: 14px; color: #333; font-weight: bold;">{weipin:loginid},您好！</p>
                            <p>您忘记了登录密码，如果确定需要更改密码，{weipin:activatelink}<br />
                                如果不做任何操作，系统将保留原密码。</p>
                            <p style="color: red">特别提醒：请在3天内完成操作，更改密码，如果超过3天，链接将失效。</p>
                            <p>如果点击上面的链接无效，请点击以下链接，或将以下链接复制到浏览器地址栏中访问，即可进行密码修改操作：<br />
                                {weipin:activatelinkall}</p>
                            <p>如果您还有其他问题，请联系网站客服人员：<a href="mailto:service@weipin365.com" style="color: #0066FF"
                                target="_blank">service@weipin365.com</a></p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
